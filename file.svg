@import "tailwindcss";

@theme inline {
  --font-sans: var(--font-geist-sans);
  --font-mono: var(--font-geist-mono);
  --animate-fade-up: fade-up 0.6s ease-out both;
  --animate-bounce-slow: bounce-slow 2.4s ease-in-out infinite;
}

@keyframes fade-up {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes bounce-slow {
  0%,
  100% {
    transform: translateY(0) rotate(0deg);
  }
  50% {
    transform: translateY(-12px) rotate(20deg);
  }
}

body {
  color: #fff;
  font-family: var(--font-geist-sans), Arial, Helvetica, sans-serif;
  background-color: #060d1a;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(16, 185, 129, 0.18), transparent),
    radial-gradient(ellipse 60% 40% at 85% 100%, rgba(99, 102, 241, 0.12), transparent),
    radial-gradient(ellipse 50% 40% at 10% 90%, rgba(245, 158, 11, 0.08), transparent);
  background-attachment: fixed;
}
